name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Laravel
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 22

      - name: Install Laravel dependencies
        run: composer install

      - name: Install Node dependencies
        run: npm install
